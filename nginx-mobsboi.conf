server {
    listen 80;
    server_name mobsboi.ru www.mobsboi.ru;

    # Перенаправляем HTTP → HTTPS (после установки SSL)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mobsboi.ru www.mobsboi.ru;

    # SSL сертификат (Let's Encrypt — бесплатно)
    ssl_certificate     /etc/letsencrypt/live/mobsboi.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mobsboi.ru/privkey.pem;

    # Проксируем все запросы на FastAPI
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Кэшируем статику (JS, CSS, картинки)
    location /static {
        alias /var/www/mobsboi/static;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Кэшируем API на 4 минуты (парсер обновляет каждые 5)
    location /api/ {
        proxy_pass       http://127.0.0.1:8000;
        proxy_cache_valid 200 4m;
        add_header X-Cache-Status $upstream_cache_status;
    }
}
