<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>МобСбой — карта сбоев интернета в Москве</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<style>
:root {
  --bg:       #faf7f2;
  --surface:  #ffffff;
  --surface2: #fdf9f4;
  --border:   #ede8df;
  --border2:  #ddd4c8;
  --text:     #2c2118;
  --muted:    #9e8f82;
  --hint:     #c2b5a6;
  --red:      #d95535;
  --orange:   #ed8d42;
  --yellow:   #f0be38;
  --green:    #52a86e;
  --blue:     #4e8ec4;
  --mts:      #d40019;
  --beeline:  #c98800;
  --megafon:  #2f9150;
  --tele2:    #2474b8;
  --sh-sm: 0 2px 10px rgba(50,30,10,.07);
  --sh-md: 0 6px 24px rgba(50,30,10,.11);
  --sh-lg: 0 10px 44px rgba(50,30,10,.15);
  --font: 'Nunito', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--font); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* HEADER */
header {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 22px; height:60px;
  background:var(--surface); border-bottom:1.5px solid var(--border);
  flex-shrink:0; z-index:1000;
}
.logo { display:flex; align-items:center; gap:10px; font-size:17px; font-weight:900; letter-spacing:-.3px; }
.logo-badge {
  width:34px; height:34px; border-radius:12px;
  background:linear-gradient(140deg,#f0904a,#d95535);
  display:flex; align-items:center; justify-content:center;
  font-size:16px; box-shadow:0 3px 12px rgba(217,85,53,.32);
}
.live-chip {
  display:flex; align-items:center; gap:6px;
  background:#fff3ee; border:1.5px solid #fac9b8; color:var(--red);
  padding:5px 13px; border-radius:100px; font-size:12px; font-weight:800;
}
.live-dot { width:7px; height:7px; background:var(--red); border-radius:50%; animation:blink 1.6s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.75)} }
.upd-lbl { font-size:12px; color:var(--muted); font-weight:700; }

/* LAYOUT */
.main { display:flex; flex:1; overflow:hidden; }

/* SIDEBAR */
.sidebar {
  width:288px; flex-shrink:0;
  background:var(--surface); border-right:1.5px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}
.sec { padding:16px 16px 14px; border-bottom:1.5px solid var(--border); }
.sec-lbl { font-size:10px; font-weight:800; letter-spacing:1.6px; text-transform:uppercase; color:var(--hint); margin-bottom:11px; }

/* OPERATORS */
.op-list { display:flex; flex-direction:column; gap:6px; }
.op-btn {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 13px; border-radius:14px; border:1.5px solid var(--border);
  background:var(--surface2); cursor:pointer; transition:all .17s;
  font-family:var(--font); font-size:13px; font-weight:700; color:var(--hint);
}
.op-btn:hover { background:#fffaf5; border-color:var(--border2); }
.op-btn.active { color:var(--text); }
.op-btn.active.mts     { background:#fff1f1; border-color:#f5b8b8; }
.op-btn.active.beeline { background:#fffcee; border-color:#fce8a0; }
.op-btn.active.megafon { background:#f0faf5; border-color:#a8dfc0; }
.op-btn.active.tele2   { background:#f0f7ff; border-color:#a8cef0; }
.op-l { display:flex; align-items:center; gap:9px; }
.op-dot { width:9px; height:9px; border-radius:50%; }
.op-r { display:flex; align-items:center; gap:5px; }
.op-cnt { font-size:13px; font-weight:900; }
.op-tr { font-size:11px; font-weight:800; }
.up { color:var(--red); } .dn { color:var(--green); }

/* STATS */
.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.sc {
  background:var(--surface2); border:1.5px solid var(--border);
  border-radius:14px; padding:12px 13px; transition:box-shadow .2s;
}
.sc:hover { box-shadow:var(--sh-sm); }
.sc.wide { grid-column:span 2; }
.sv { font-size:24px; font-weight:900; line-height:1.1; margin-bottom:3px; }
.sv.r { color:var(--red); } .sv.o { color:var(--orange); } .sv.g { color:var(--green); } .sv.b { color:var(--blue); }
.sl { font-size:10px; font-weight:800; color:var(--hint); text-transform:uppercase; letter-spacing:.8px; }

/* FEED */
.feed-wrap { flex:1; overflow-y:auto; padding:12px 16px; }
.feed-wrap::-webkit-scrollbar { width:3px; }
.feed-wrap::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }
.feed-item { display:flex; gap:10px; padding:10px 0; border-bottom:1.5px solid var(--border); animation:fin .3s ease; }
@keyframes fin { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:none} }
.fa { width:30px; height:30px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:900; color:#fff; flex-shrink:0; }
.fb { flex:1; min-width:0; }
.fd { font-size:12px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.fac { font-size:11px; color:var(--muted); font-weight:600; margin-top:1px; }
.ft { font-size:10px; color:var(--hint); font-weight:700; flex-shrink:0; margin-top:2px; }

/* MAP */
.map-wrap { flex:1; position:relative; overflow:hidden; }
#map { width:100%; height:100%; }

/* Leaflet overrides — warm */
.leaflet-tile { filter:sepia(15%) saturate(90%) brightness(1.05) !important; }
.leaflet-control-zoom { border:none !important; box-shadow:var(--sh-md) !important; border-radius:16px !important; overflow:hidden; }
.leaflet-control-zoom a {
  background:var(--surface) !important; color:var(--text) !important;
  border:none !important; border-bottom:1.5px solid var(--border) !important;
  font-family:var(--font) !important; font-weight:700 !important;
  font-size:16px !important; width:36px !important; height:36px !important; line-height:36px !important;
  transition:background .15s !important;
}
.leaflet-control-zoom a:last-child { border-bottom:none !important; }
.leaflet-control-zoom a:hover { background:var(--surface2) !important; }

/* Popup */
.leaflet-popup-content-wrapper {
  background:var(--surface) !important; border:1.5px solid var(--border) !important;
  border-radius:20px !important; box-shadow:var(--sh-lg) !important;
  padding:0 !important; overflow:hidden;
}
.leaflet-popup-content { margin:0 !important; font-family:var(--font) !important; }
.leaflet-popup-tip-container { display:none; }
.leaflet-popup-close-button { color:var(--muted) !important; font-size:18px !important; padding:10px 12px !important; }
.pop { padding:18px 20px; min-width:210px; }
.pop-name { font-size:15px; font-weight:900; margin-bottom:2px; }
.pop-sub { font-size:11px; color:var(--muted); font-weight:700; margin-bottom:13px; }
.pop-row { margin-bottom:8px; }
.pop-rl { display:flex; justify-content:space-between; font-size:12px; font-weight:800; margin-bottom:4px; }
.pop-bg { height:6px; background:var(--border); border-radius:100px; overflow:hidden; }
.pop-fill { height:100%; border-radius:100px; }

/* Map overlay */
.ov { position:absolute; top:0;left:0;right:0;bottom:0; pointer-events:none; z-index:500; }
.ov-tr { position:absolute; top:16px; right:16px; display:flex; flex-direction:column; gap:8px; pointer-events:all; }
.pill {
  background:var(--surface); border:1.5px solid var(--border); border-radius:100px;
  padding:9px 18px; font-family:var(--font); font-size:12px; font-weight:800;
  color:var(--muted); cursor:pointer; box-shadow:var(--sh-sm); transition:all .17s; white-space:nowrap;
}
.pill:hover { background:var(--bg); border-color:var(--border2); color:var(--text); }
.pill.on { background:linear-gradient(135deg,var(--orange),var(--red)); border-color:transparent; color:#fff; box-shadow:0 4px 16px rgba(217,85,53,.3); }
.ov-bot { position:absolute; bottom:18px; left:18px; right:18px; display:flex; justify-content:space-between; align-items:flex-end; pointer-events:none; }
.leg {
  background:var(--surface); border:1.5px solid var(--border);
  border-radius:18px; padding:14px 16px; box-shadow:var(--sh-md);
}
.leg-t { font-size:10px; font-weight:800; color:var(--hint); text-transform:uppercase; letter-spacing:1px; margin-bottom:9px; }
.leg-g { height:8px; border-radius:100px; background:linear-gradient(90deg,#52a86e,#f0be38,#ed8d42,#d95535); width:190px; margin-bottom:6px; }
.leg-ll { display:flex; justify-content:space-between; font-size:10px; font-weight:800; color:var(--hint); }
.src {
  background:var(--surface); border:1.5px solid var(--border);
  border-radius:16px; padding:10px 14px; font-size:11px;
  color:var(--muted); font-weight:700; box-shadow:var(--sh-md); line-height:1.6;
}
.src a { color:var(--orange); text-decoration:none; }
.src a:hover { text-decoration:underline; }
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-badge">📡</div>
    МобСбой
  </div>
  <div style="display:flex;align-items:center;gap:14px">
    <div class="live-chip"><div class="live-dot"></div>LIVE</div>
    <span class="upd-lbl" id="upd">обновлено только что</span>
  </div>
</header>

<div class="main">
  <div class="sidebar">

    <div class="sec">
      <div class="sec-lbl">Операторы</div>
      <div class="op-list">
        <button class="op-btn active mts"     onclick="toggleOp('mts',this)">
          <div class="op-l"><div class="op-dot" style="background:var(--mts)"></div>МТС</div>
          <div class="op-r"><span class="op-cnt" id="c-mts"     style="color:var(--mts)">–</span><span class="op-tr" id="t-mts">↑</span></div>
        </button>
        <button class="op-btn active beeline" onclick="toggleOp('beeline',this)">
          <div class="op-l"><div class="op-dot" style="background:var(--beeline)"></div>Билайн</div>
          <div class="op-r"><span class="op-cnt" id="c-beeline" style="color:var(--beeline)">–</span><span class="op-tr" id="t-beeline">↓</span></div>
        </button>
        <button class="op-btn active megafon" onclick="toggleOp('megafon',this)">
          <div class="op-l"><div class="op-dot" style="background:var(--megafon)"></div>Мегафон</div>
          <div class="op-r"><span class="op-cnt" id="c-megafon" style="color:var(--megafon)">–</span><span class="op-tr" id="t-megafon">↑</span></div>
        </button>
        <button class="op-btn active tele2"   onclick="toggleOp('tele2',this)">
          <div class="op-l"><div class="op-dot" style="background:var(--tele2)"></div>Теле2</div>
          <div class="op-r"><span class="op-cnt" id="c-tele2"   style="color:var(--tele2)">–</span><span class="op-tr" id="t-tele2">↓</span></div>
        </button>
      </div>
    </div>

    <div class="sec">
      <div class="sec-lbl">Обстановка</div>
      <div class="stats-grid">
        <div class="sc"><div class="sv r" id="s-tot">–</div><div class="sl">жалоб / час</div></div>
        <div class="sc"><div class="sv o" id="s-zon">–</div><div class="sl">зон сбоев</div></div>
        <div class="sc wide"><div class="sv b" id="s-wst" style="font-size:16px;line-height:1.35">–</div><div class="sl">худший район</div></div>
      </div>
    </div>

    <div class="sec-lbl" style="padding:14px 16px 0">Лента жалоб</div>
    <div class="feed-wrap" id="feed"></div>
  </div>

  <div class="map-wrap">
    <div id="map"></div>
    <div class="ov">
      <div class="ov-tr">
        <button class="pill on" id="b-heat" onclick="swLayer('heat',this)">🔥 Тепловая карта</button>
        <button class="pill"    id="b-dots" onclick="swLayer('dots',this)">📍 Точки сбоев</button>
        <button class="pill"    id="b-ref"  onclick="doRef()">↺ Обновить данные</button>
      </div>
      <div class="ov-bot">
        <div class="leg">
          <div class="leg-t">Интенсивность сбоев</div>
          <div class="leg-g"></div>
          <div class="leg-ll"><span>Нет</span><span>Слабо</span><span>Много</span><span>Критично</span></div>
        </div>
        <div class="src">
          Источник: <a href="https://downdetector.ru" target="_blank">Downdetector.ru</a><br>
          <span style="color:var(--hint);font-size:10px">данные симулированы (прототип)</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const OPS = {
  mts:     { name:'МТС',     color:'#d40019' },
  beeline: { name:'Билайн',  color:'#c98800' },
  megafon: { name:'Мегафон', color:'#2f9150' },
  tele2:   { name:'Теле2',   color:'#2474b8' },
};

const DISTRICTS = [
  {name:'Центральный',lat:55.752,lng:37.621},
  {name:'Северный',lat:55.840,lng:37.490},
  {name:'Северо-Восточный',lat:55.860,lng:37.640},
  {name:'Восточный',lat:55.780,lng:37.810},
  {name:'Юго-Восточный',lat:55.700,lng:37.770},
  {name:'Южный',lat:55.640,lng:37.640},
  {name:'Юго-Западный',lat:55.660,lng:37.460},
  {name:'Западный',lat:55.730,lng:37.330},
  {name:'Северо-Западный',lat:55.810,lng:37.380},
  {name:'Зеленоград',lat:55.990,lng:37.190},
  {name:'Бутово',lat:55.570,lng:37.590},
  {name:'Митино',lat:55.840,lng:37.310},
  {name:'Некрасовка',lat:55.700,lng:37.900},
  {name:'Марьино',lat:55.660,lng:37.750},
  {name:'Сокольники',lat:55.789,lng:37.681},
  {name:'Хамовники',lat:55.730,lng:37.570},
  {name:'Коломенское',lat:55.668,lng:37.666},
  {name:'Преображенское',lat:55.798,lng:37.720},
  {name:'Новомосковский',lat:55.540,lng:37.410},
  {name:'Люблино',lat:55.678,lng:37.757},
];

const ACTIONS = ['Нет интернета','Медленная загрузка','Обрывы соединения','4G не работает','Пропал сигнал','Не грузит видео','Мессенджеры не работают'];

let activeOps = new Set(['mts','beeline','megafon','tele2']);
let curLayer = 'heat';
let heatL = null, dotsL = null, invisL = null;
let cache = null;

// MAP
const map = L.map('map',{ center:[55.751,37.618], zoom:11, zoomControl:false, attributionControl:false });

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:18, attribution:'© OpenStreetMap'
}).addTo(map);

L.control.zoom({ position:'topright' }).addTo(map);

// Apply warm filter to tiles
function applyTileFilter() {
  document.querySelectorAll('.leaflet-tile').forEach(t => {
    t.style.filter = 'sepia(15%) saturate(88%) brightness(1.04)';
  });
}
map.on('tileload', applyTileFilter);
setTimeout(applyTileFilter, 300);

// DATA
function genData() {
  const ds = {};
  const pts = [];

  DISTRICTS.forEach(d => {
    const intensity = Math.pow(Math.random(), 0.65);
    ds[d.name] = { intensity, lat:d.lat, lng:d.lng, ops:{} };
    Object.keys(OPS).forEach(op => {
      ds[d.name].ops[op] = activeOps.has(op) ? Math.floor(intensity * 170 * Math.random()) : 0;
    });
    const n = Math.floor(intensity * 32);
    for (let i=0;i<n;i++) {
      pts.push([
        d.lat + (Math.random()-.5)*.14,
        d.lng + (Math.random()-.5)*.16,
        intensity * (.4 + Math.random()*.6)
      ]);
    }
  });

  const opT = {};
  Object.keys(OPS).forEach(op => {
    opT[op] = Object.values(ds).reduce((s,d)=>s+(d.ops[op]||0),0);
  });
  const total = Object.values(opT).reduce((a,b)=>a+b,0);
  const zones = Object.values(ds).filter(d=>d.intensity>.45).length;
  const worst = Object.entries(ds).sort((a,b)=>b[1].intensity-a[1].intensity)[0];

  const feed = Array.from({length:14},()=>{
    const d = DISTRICTS[Math.floor(Math.random()*DISTRICTS.length)];
    const op = [...activeOps][Math.floor(Math.random()*activeOps.size)]||'mts';
    return { district:d.name, op, action:ACTIONS[Math.floor(Math.random()*ACTIONS.length)], mins:Math.floor(Math.random()*55)+1 };
  }).sort((a,b)=>a.mins-b.mins);

  return { ds, pts, opT, total, zones, worst, feed };
}

// RENDER
function render(data) {
  cache = data;

  document.getElementById('s-tot').textContent = data.total.toLocaleString('ru');
  document.getElementById('s-zon').textContent = data.zones;
  document.getElementById('s-wst').textContent = data.worst ? data.worst[0] : '–';

  Object.keys(OPS).forEach(op => {
    document.getElementById('c-'+op).textContent = data.opT[op]||0;
    const up = Math.random()>.45;
    const t = document.getElementById('t-'+op);
    t.textContent = up?'↑':'↓';
    t.className = 'op-tr '+(up?'up':'dn');
  });

  buildLayers(data);
  renderFeed(data.feed);

  const n = new Date();
  document.getElementById('upd').textContent =
    `обновлено в ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}

function buildLayers(data) {
  clearLayers();

  heatL = L.heatLayer(data.pts,{
    radius:42, blur:32, maxZoom:14,
    gradient:{ 0:'#52a86e', .35:'#f0be38', .65:'#ed8d42', 1:'#d95535' }
  });

  dotsL = L.layerGroup();
  invisL = L.layerGroup();

  DISTRICTS.forEach(d => {
    const s = data.ds[d.name];
    const tot = Object.values(s.ops).reduce((a,b)=>a+b,0);
    if (tot < 3) return;

    const maxC = Math.max(...Object.values(s.ops),1);
    const pop = buildPopup(d.name, s.ops, tot, maxC);
    const popOpts = { maxWidth:270, autoPanPadding:[20,20] };

    // dot marker
    const clr = s.intensity>.7?'#d95535':s.intensity>.45?'#ed8d42':s.intensity>.2?'#f0be38':'#52a86e';
    const dot = L.circleMarker([d.lat,d.lng],{
      radius:7+s.intensity*15, fillColor:clr, color:'#fff', weight:2.5, fillOpacity:.85
    });
    dot.bindPopup(pop, popOpts);
    dotsL.addLayer(dot);

    // invisible clickable for heat mode
    const invis = L.circleMarker([d.lat,d.lng],{
      radius:22, fillColor:'transparent', color:'transparent', weight:0, fillOpacity:0
    });
    invis.bindPopup(pop, popOpts);
    invisL.addLayer(invis);
  });

  if (curLayer==='heat') {
    heatL.addTo(map);
    invisL.addTo(map);
  } else {
    dotsL.addTo(map);
  }
}

function clearLayers() {
  if (heatL)  { map.removeLayer(heatL);  heatL=null;  }
  if (dotsL)  { map.removeLayer(dotsL);  dotsL=null;  }
  if (invisL) { map.removeLayer(invisL); invisL=null; }
}

function buildPopup(name, ops, total, maxC) {
  const rows = Object.entries(ops).map(([op,cnt])=>`
    <div class="pop-row">
      <div class="pop-rl">
        <span style="color:${OPS[op].color}">${OPS[op].name}</span>
        <span style="color:var(--muted)">${cnt}</span>
      </div>
      <div class="pop-bg">
        <div class="pop-fill" style="width:${Math.round(cnt/maxC*100)}%;background:${OPS[op].color}"></div>
      </div>
    </div>`).join('');
  return `<div class="pop">
    <div class="pop-name">${name}</div>
    <div class="pop-sub">${total} жалоб за последний час</div>
    ${rows}
  </div>`;
}

function renderFeed(items) {
  document.getElementById('feed').innerHTML = items.map(item=>{
    const op = OPS[item.op];
    return `<div class="feed-item">
      <div class="fa" style="background:${op.color}">${op.name.slice(0,2)}</div>
      <div class="fb">
        <div class="fd">${item.district}</div>
        <div class="fac">${item.action}</div>
      </div>
      <div class="ft">${item.mins}м</div>
    </div>`;
  }).join('');
}

// CONTROLS
function toggleOp(op, btn) {
  if (activeOps.has(op)) {
    if (activeOps.size===1) return;
    activeOps.delete(op);
    btn.classList.remove('active', op);
  } else {
    activeOps.add(op);
    btn.classList.add('active', op);
  }
  // Загружаем реальные данные с API, fallback на мок
function transformApiData(api) {
  const ds = {};
  Object.entries(api.district_stats || {}).forEach(([name, info]) => {
    const tot = info.total || 0;
    ds[name] = {
      intensity: Math.min(tot / 150, 1),
      lat: info.lat, lng: info.lng,
      ops: info.ops || {}
    };
  });
  return {
    ds,
    pts: (api.points || []),
    opT: api.op_totals || {},
    total: api.total || 0,

function swLayer(type, btn) {
  document.getElementById('b-heat').classList.remove('on');
  document.getElementById('b-dots').classList.remove('on');
  btn.classList.add('on');
  curLayer = type;
  if (!cache) return;
  clearLayers();
  if (type==='heat') { heatL.addTo(map); invisL.addTo(map); }
  else               { dotsL.addTo(map); }
  // re-add layers since clearLayers destroyed them
  buildLayers(cache);
}
